<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopEasy</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
    <h2>Shop<span>Easy</span></h2>
    </div>
    <input type="text" id="search" placeholder="Search products">

    <div class="cart">
        🛒 Cart: <span id="count">0</span>
    </div>
</header>

<section class="products" id="products">

<div class="card">
<img src="img/headphone.webp">
<h3>Headphone</h3>
<p>₹1999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="img/watch.webp">
<h3>Watch</h3>
<p>₹2999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="img/shoes.webp">
<h3>Shoes</h3>
<p>₹2499</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="img/bag.webp">
<h3>Laptop Bag</h3>
<p>₹999</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</section>

<script src="script.js"></script>
<footer>
<p>© 2026 ShopEasy</p>
</footer>
</body>
</html>
